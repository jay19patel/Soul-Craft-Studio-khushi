<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_name }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: #334155;
            --success: #22c55e;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            margin-bottom: 60px;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .guide-description {
            color: var(--text-dim);
            font-size: 1.2rem;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
        }

        .feature-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            transition: transform 0.2s, border-color 0.2s;
        }

        .feature-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
        }

        .feature-card h2 {
            margin-top: 0;
            color: var(--primary);
            font-size: 1.5rem;
        }

        .feature-card p {
            color: var(--text-dim);
            margin-bottom: 24px;
        }

        code {
            display: block;
            background: #000;
            padding: 16px;
            border-radius: 8px;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 0.9rem;
            color: #d1d5db;
            white-space: pre-wrap;
            border-left: 4px solid var(--primary);
        }

        footer {
            margin-top: 80px;
            text-align: center;
            color: var(--text-dim);
            font-size: 0.9rem;
            border-top: 1px solid var(--border);
            padding-top: 40px;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 999px;
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="badge">Backbone Framework</div>
            <h1>{{ page_name }}</h1>
            <p class="guide-description">{{ page_description }}</p>
        </header>

        <section class="feature-grid">
            {% for feature in backbone_features %}
            <div class="feature-card">
                <h2>{{ feature.name }}</h2>
                <p>{{ feature.description }}</p>
                <code>{{ feature.usage }}</code>
            </div>
            {% endfor %}
        </section>

        <footer>
            <p>&copy; {{ current_year }} Soul Craft Studio. Built with Backbone library.</p>
        </footer>
    </div>
</body>
</html>
