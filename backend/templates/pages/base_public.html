<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_name or "Blogermenia Page" }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
    <div class="fixed inset-0 -z-10 bg-[radial-gradient(circle_at_top_left,_rgba(99,102,241,0.10),_transparent_28%),radial-gradient(circle_at_bottom_right,_rgba(168,85,247,0.10),_transparent_24%),linear-gradient(to_bottom,_#ffffff,_#f8fafc,_#eef2ff)]"></div>
    <header class="border-b border-white/70 bg-white/80 backdrop-blur">
        <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
            <a href="/" class="flex items-center gap-3 text-slate-900">
                <span class="flex h-10 w-10 items-center justify-center rounded-2xl bg-gradient-to-br from-indigo-600 to-violet-600 text-sm font-bold text-white shadow-lg shadow-indigo-200">B</span>
                <span>
                    <span class="block text-sm font-semibold tracking-[0.24em] text-slate-500">BLOGERMENIA</span>
                    <span class="block text-base font-bold text-slate-900">{{ page_name or "Page" }}</span>
                </span>
            </a>
            <nav class="flex items-center gap-3 text-sm font-medium text-slate-600">
                <a href="/pages/about" class="rounded-full px-4 py-2 transition hover:bg-indigo-50 hover:text-indigo-700">About</a>
                <a href="/pages/contact" class="rounded-full px-4 py-2 transition hover:bg-indigo-50 hover:text-indigo-700">Contact</a>
                <a href="/pages/contact/submissions" class="rounded-full px-4 py-2 transition hover:bg-indigo-50 hover:text-indigo-700">Submissions</a>
                <a href="/pages/store-test" class="rounded-full px-4 py-2 transition hover:bg-indigo-50 hover:text-indigo-700">Store Test</a>
                <a href="/pages/reset-password" class="rounded-full px-4 py-2 transition hover:bg-indigo-50 hover:text-indigo-700">Reset Password</a>
            </nav>
        </div>
    </header>
    <main class="px-4 py-8 sm:px-6 lg:px-8">
        <div class="mx-auto max-w-6xl">
            {% block content %}{% endblock %}
        </div>
    </main>
</body>
</html>
