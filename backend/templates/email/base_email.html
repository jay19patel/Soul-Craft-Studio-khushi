<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Blogermenia{% endblock %}</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f3f6fb;
            font-family: "Segoe UI", Arial, sans-serif;
            color: #1f2937;
        }
        .wrapper {
            width: 100%;
            padding: 32px 12px;
        }
        .card {
            max-width: 640px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
        }
        .header {
            padding: 28px 28px 12px 28px;
            background: linear-gradient(135deg, #f9fafb 0%, #eef2ff 100%);
            border-bottom: 1px solid #e5e7eb;
        }
        .header h1 {
            margin: 0;
            font-size: 22px;
            font-weight: 700;
            color: #111827;
        }
        .content {
            padding: 24px 28px;
            line-height: 1.6;
            font-size: 15px;
        }
        .button {
            display: inline-block;
            margin-top: 14px;
            background: #2563eb;
            color: #ffffff !important;
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: 600;
        }
        .footer {
            border-top: 1px solid #e5e7eb;
            color: #6b7280;
            font-size: 12px;
            padding: 16px 28px 22px 28px;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="card">
            <div class="header">
                <h1>{% block heading %}Blogermenia{% endblock %}</h1>
            </div>
            <div class="content">
                {% block content %}{% endblock %}
            </div>
            <div class="footer">
                <div>This email was sent by Blogermenia.</div>
                <div>Support: {{ support_email or "support@blogermenia.local" }}</div>
                <div>&copy; {{ current_year or 2026 }} Blogermenia.</div>
            </div>
        </div>
    </div>
</body>
</html>
