<!DOCTYPE html>
<!-- backbone-pages-default: base_public -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_name or "Backbone Page" }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
    <div class="fixed inset-0 -z-10 bg-[radial-gradient(circle_at_top_left,_rgba(99,102,241,0.10),_transparent_28%),radial-gradient(circle_at_bottom_right,_rgba(168,85,247,0.10),_transparent_24%),linear-gradient(to_bottom,_#ffffff,_#f8fafc,_#eef2ff)]"></div>
    <main class="relative min-h-screen px-4 py-10 md:px-8">
        <div class="mx-auto max-w-5xl">
            {% block content %}{% endblock %}
        </div>
    </main>
</body>
</html>
