<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Welcome</title>
    <!-- backbone-email-default: welcome -->
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #334155; max-width: 600px; margin: 0 auto; padding: 24px; }
        .header { border-bottom: 1px solid #e2e8f0; padding-bottom: 16px; margin-bottom: 20px; }
        h1 { color: #0f172a; font-size: 22px; margin: 0; }
        .footer { margin-top: 28px; padding-top: 16px; border-top: 1px solid #e2e8f0; font-size: 12px; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Welcome to {{ app_name }}</h1>
    </div>
    <p>Hi {{ full_name }},</p>
    <p>Your account is ready. You can open the app here: <a href="{{ app_url }}">{{ app_url }}</a></p>
    <p>Regards,<br>The {{ app_name }} team</p>
    <div class="footer">This message was sent by {{ app_name }}.</div>
</body>
</html>
