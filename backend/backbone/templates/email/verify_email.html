<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Verify email</title>
    <!-- backbone-email-default: verify_email -->
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #334155; max-width: 600px; margin: 0 auto; padding: 24px; }
        .btn { display: inline-block; padding: 12px 22px; background: #4f46e5; color: #fff !important; text-decoration: none; border-radius: 8px; font-weight: 600; margin: 16px 0; }
        .footer { margin-top: 28px; padding-top: 16px; border-top: 1px solid #e2e8f0; font-size: 12px; color: #94a3b8; }
    </style>
</head>
<body>
    <h1 style="color:#0f172a;font-size:22px;">Verify your email</h1>
    <p>Hi {{ full_name }},</p>
    <p>Please confirm your address for <strong>{{ app_name }}</strong>:</p>
    <p><a class="btn" href="{{ verification_url }}">Verify email</a></p>
    <p style="word-break:break-all;font-size:13px;color:#64748b;">{{ verification_url }}</p>
    <p>If you did not sign up, you can ignore this message.</p>
    <div class="footer">{{ app_name }}</div>
</body>
</html>
